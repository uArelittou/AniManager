<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniManager</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='Amg.ico') }}" type="image/x-icon">
</head>

<body>

    {% raw %}
    <div id="app" class="min-h-screen flex flex-col">

        <header class="w-full flex justify-between items-center px-10 py-8">
            <div class="text-2xl font-black tracking-widest text-white/80 select-none">
                ANIMANAGER
            </div>

            <div>
                <button @click="showImportModal = true"
                    class="text-sm font-bold tracking-wider text-white/70 hover:text-white border border-white/30 hover:border-white px-6 py-2 transition-all duration-300">
                    [+] 导入本地文件夹
                </button>
            </div>
        </header>

        <main v-if="currentView === 'home'" class="flex-grow pb-20">
            <div class="w-full h-full px-6">
                <div v-if="Object.keys(animeData).length === 0"
                    class="flex flex-col items-center justify-center h-[60vh] text-white/30">
                    <i class="fa-solid fa-folder-open text-6xl mb-4"></i>
                    <p class="tracking-widest">暂无数据，请点击右上角导入</p>
                </div>

                <div class="grid grid-cols-5 gap-x-4 gap-y-10 mt-4">
                    <div v-for="(info, folderName) in animeData" :key="folderName" class="cursor-pointer group"
                        @click="openAnime(folderName, info)">

                        <div
                            class="w-full aspect-[3/4] bg-[#1a1a1a] poster-card relative overflow-hidden flex items-center justify-center border border-white/5">
                            <img v-if="info.cover_url" :src="info.cover_url" class="w-full h-full object-cover"
                                loading="lazy">
                            <div v-else class="text-white/20 flex flex-col items-center">
                                <i class="fa-solid fa-image text-3xl mb-2"></i>
                                <span class="text-xs tracking-widest">NO COVER</span>
                            </div>

                            <div
                                class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity duration-300">
                                <i class="fa-solid fa-play text-3xl text-white"></i>
                            </div>
                        </div>

                        <div class="mt-3 text-center">
                            <h3 class="text-[13px] font-bold tracking-wide text-white/90 truncate px-1"
                                :title="info.official_name || folderName">
                                {{ info.official_name || folderName }}
                            </h3>
                            <p class="text-xs text-white/40 mt-1 tracking-widest">{{ info.videos ? info.videos.length :
                                0 }} EP</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <main v-if="currentView === 'episodes'" class="flex-grow px-10 pb-20 max-w-6xl mx-auto w-full">
            <div class="flex gap-14 items-start">

                <div class="w-[40%] shrink-0 flex flex-col">
                    <div class="w-full aspect-[4/3] bg-[#121212] p-2 relative shadow-2xl group border border-white/5">
                        <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-white/50"></div>
                        <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-white/50"></div>
                        <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-white/50"></div>
                        <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-white/50"></div>

                        <img v-if="activeAnimeInfo.cover_url" :src="activeAnimeInfo.cover_url"
                            class="w-full h-full object-cover filter brightness-90 group-hover:brightness-100 transition-all duration-500">
                        <div v-else
                            class="w-full h-full flex items-center justify-center text-white/20 border border-white/5">
                            NO COVER
                        </div>
                    </div>

                    <div class="mt-4 border border-white/20 p-3 bg-black/40 relative">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-12 h-[1px] bg-white"></div>
                        <h1 class="text-xl font-black mb-2 tracking-wider text-center">{{ activeAnimeInfo.official_name
                            || activeAnimeName }}</h1>

                        <button @click="goBack"
                            class="fixed top-[100px] left-10 text-white/50 hover:text-white transition-all duration-300 tracking-widest text-lg font-bold flex items-center gap-2 group z-50">
                            <i
                                class="fa-solid fa-arrow-left group-hover:-translate-x-2 transition-transform duration-300"></i>
                            <span class="group-hover:text-shadow-[0_0_8px_rgba(255,255,255,0.8)]">返回</span>
                        </button>
                    </div>
                </div>

                <div class="w-[60%] flex flex-col">
                    <div class="flex items-end justify-between border-b border-white/20 pb-2 mb-4">
                        <span class="text-white/60 tracking-widest text-xs font-bold">EPISODE：</span>
                        <div class="flex gap-1">
                            <div class="w-1 h-1 bg-white/40"></div>
                            <div class="w-1 h-1 bg-white/40"></div>
                            <div class="w-1 h-1 bg-white/80"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-5 gap-4 overflow-y-auto pr-4 pb-4 content-start episodes-scroll"
                        style="max-height: 510px;">
                        <button v-for="(vid, index) in activeAnimeInfo.videos" :key="index" @click="playVideo(vid.path)"
                            class="aspect-square bg-[#1a1a1a] border border-white/10 hover:border-white hover:bg-white text-white/50 hover:text-black transition-all duration-300 flex flex-col items-center justify-center group relative shadow-lg">

                            <span class="text-3xl font-black">{{ index + 1 }}</span>

                            <div :class="[
                                        'absolute hidden group-hover:flex flex-col items-center z-50 w-[220px] pointer-events-none transition-all duration-300',
                                        index < 5 ? 'top-full mt-3' : 'bottom-full mb-3'
                                        ]">
                                <div v-if="index < 5"
                                    class="w-3 h-3 bg-black border-t border-l border-white/30 rotate-45 -mb-2 relative z-20">
                                </div>

                                <div
                                    class="bg-black text-white text-xs border border-white/30 p-2 text-center break-all shadow-2xl relative z-10">
                                    {{ vid.name }}<br>
                                    <span class="text-white/50 mt-1 inline-block">{{ vid.size }} MB</span>
                                </div>

                                <div v-if="index >= 5"
                                    class="w-3 h-3 bg-black border-r border-b border-white/30 rotate-45 -mt-2 relative z-20">
                                </div>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <transition name="fade">
            <div v-if="showImportModal"
                class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
                <div class="bg-[#111] border border-white/10 p-8 w-[500px] shadow-2xl relative">
                    <button @click="showImportModal = false; isScanning = false"
                        class="absolute top-4 right-4 text-white/40 hover:text-white">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>

                    <h2 class="text-xl font-bold tracking-widest mb-2">选择包含番剧视频的文件夹</h2>
                    <p class="text-white/40 text-xs mb-6 tracking-widest">如果是罗马音的番剧文件名 无法识别喔~</p>

                    <div class="flex gap-3 mb-6">
                        <button @click="selectFolder" :disabled="isSelecting"
                            class="flex-1 bg-white/10 border border-white/30 text-white font-bold py-3 hover:bg-white/20 transition-colors disabled:bg-white/5 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                            <i class="fa-solid fa-folder-open"></i>
                            <span v-if="isSelecting">系统唤醒中...</span>
                            <span v-else>{{ scanPath ? '重新选择' : '点"ᗜ𖥦ᗜ"我' }}</span>
                        </button>
                    </div>

                    <div v-if="scanPath"
                        class="mb-4 p-3 bg-black border border-white/10 rounded text-xs text-white/70 break-all font-mono">
                        <span class="text-white/40">已锁定目标: </span>{{ scanPath }}
                    </div>

                    <button @click="startScan" :disabled="isScanning"
                        class="w-full bg-white text-black font-bold py-3 hover:bg-white/80 transition-colors disabled:bg-white/30 disabled:cursor-not-allowed">
                        <span v-if="isScanning"><i class="fa-solid fa-spinner fa-spin mr-2"></i> 解析中...</span>
                        <span v-else> 扫 描 ! </span>
                    </button>

                    <p v-if="scanMessage" :class="{'text-green-400': scanSuccess, 'text-red-400': !scanSuccess}"
                        class="mt-4 text-sm text-center">
                        {{ scanMessage }}
                    </p>
                </div>
            </div>
        </transition>

    </div>
    {% endraw %}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
